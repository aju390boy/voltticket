version: '3.9'

services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - volttticket

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      - NODE_ENV=development
      - PORT=3001
    ports:
      - '3001:3001'
    depends_on:
      - redis
      - mongo
    volumes:
      - ./backend/src:/app/src
    networks:
      - volttticket
    command: npm run dev

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      - NODE_ENV=development
      - RUN_WORKER=true
    depends_on:
      - redis
      - mongo
    volumes:
      - ./backend/src:/app/src
    networks:
      - volttticket
    command: npm run worker

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - volttticket
    command: redis-server --save 60 1 --loglevel warning

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - volttticket
    environment:
      MONGO_INITDB_DATABASE: volttticket

  mongo-express:
    image: mongo-express:latest
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo
    networks:
      - volttticket

  stripe-mock:
    image: stripemock/stripe-mock:latest
    ports:
      - '12111:12111'
    networks:
      - volttticket

volumes:
  redis_data:
  mongo_data:

networks:
  volttticket:
    driver: bridge
